services:
  # ── 1. Frontend (React / Vite) ─────────────────────────────────────────────
  - type: web
    name: unitrade-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set manually in Render dashboard
      - key: VITE_SOCKET_URL
        sync: false

  # ── 2. Backend (Node / Express) ───────────────────────────────────────────
  - type: web
    name: unitrade-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # paste your MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false          # https://unitrade-frontend.onrender.com
      - key: AI_PRICE_SERVICE_URL
        sync: false          # https://unitrade-ai.onrender.com/ai/predict-price
      - key: START_AI_PRICE_SERVICE
        value: "false"       # Render runs AI as a separate service
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── 3. AI Price Service (Python / FastAPI) ────────────────────────────────
  - type: web
    name: unitrade-ai
    runtime: python
    rootDir: .
    buildCommand: pip install -r ai/requirements.txt
    startCommand: uvicorn ai.ai_price_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8001
