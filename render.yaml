services:
  # Backend + AI in one Docker container (free tier friendly)
  - type: web
    name: unitrade-backend
    runtime: docker
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: START_AI_PRICE_SERVICE
        value: "false"                 # AI is started by start.sh, not Node
      - key: AI_PRICE_SERVICE_URL
        value: "http://127.0.0.1:8001/ai/predict-price"
      - key: MONGO_URI
        sync: false                    # set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false                    # your Vercel frontend URL
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
